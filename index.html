<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Omi AI | Your Intelligent Companion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f5f5f7; color: #1d1d1f; }
        .glassmorphism { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.25); box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.04); }
        .glassmorphism-sidebar { background: rgba(245, 245, 247, 0.85); backdrop-filter: blur(20px); border-right: 1px solid rgba(0, 0, 0, 0.05); }
        ::-webkit-scrollbar { width: 8px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: #c7c7cc; border-radius: 10px; }
    </style>
</head>
<body class="h-dvh w-full overflow-hidden flex flex-col">
    <!-- Rest of your UI remains the same... -->
    <!-- UPDATED SETTINGS MODAL SECTION -->
    <div id="settings-modal" class="fixed inset-0 bg-black/40 backdrop-blur-sm hidden z-[100] flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl w-full max-w-lg shadow-2xl border border-white/20 overflow-hidden flex flex-col max-h-[90vh]">
            <div class="px-6 py-5 border-b border-gray-100 flex justify-between items-center bg-gray-50/50">
                <h2 class="text-base font-bold tracking-tight">App Configuration</h2>
                <button onclick="closeSettings()" class="text-gray-400 hover:text-gray-600">✕</button>
            </div>
            <div class="p-6 overflow-y-auto flex-1 space-y-5">
                <div>
                    <label class="block text-xs font-semibold text-gray-700 mb-1.5">OpenRouter API Key</label>
                    <input type="password" id="api-key" placeholder="sk-or-v1-..." class="w-full px-3.5 py-2.5 bg-gray-50/80 border border-gray-200 rounded-xl text-sm font-mono focus:outline-none">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-700 mb-1.5">Model ID (Manual Input)</label>
                    <input type="text" id="manual-model-input" placeholder="e.g., anthropic/claude-3.5-sonnet" class="w-full px-3.5 py-2.5 bg-gray-50/80 border border-gray-200 rounded-xl text-sm font-mono focus:outline-none">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-700 mb-1.5">System Instructions</label>
                    <textarea id="system-prompt" rows="3" class="w-full px-3.5 py-2.5 bg-gray-50/80 border border-gray-200 rounded-xl text-sm focus:outline-none resize-none"></textarea>
                </div>
            </div>
            <div class="px-6 py-4 border-t border-gray-100 bg-gray-50/50 flex justify-end gap-3">
                <button onclick="closeSettings()" class="px-5 py-2.5 border border-gray-200 rounded-xl text-xs font-semibold">Cancel</button>
                <button onclick="saveSettings()" class="px-5 py-2.5 bg-black text-white rounded-xl text-xs font-semibold">Save Configuration</button>
            </div>
        </div>
    </div>
    
    <script>
        // UPDATED LOGIC
        function openSettings() {
            document.getElementById('api-key').value = config.apiKey;
            document.getElementById('manual-model-input').value = config.model;
            document.getElementById('system-prompt').value = config.sysPrompt;
            document.getElementById('settings-modal').classList.remove('hidden');
        }

        function saveSettings() {
            config.apiKey = document.getElementById('api-key').value.trim();
            config.model = document.getElementById('manual-model-input').value.trim();
            config.sysPrompt = document.getElementById('system-prompt').value.trim();
            localStorage.setItem('omi_config', JSON.stringify(config));
            closeSettings();
        }
        // ... rest of your script
    </script>
</body>
</html>
