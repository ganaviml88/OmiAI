<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omi AI | Your Intelligent Companion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f5f5f7; color: #1d1d1f; }
        .glassmorphism { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.25); }
        .glassmorphism-sidebar { background: rgba(245, 245, 247, 0.85); backdrop-filter: blur(20px); border-right: 1px solid rgba(0, 0, 0, 0.05); }
        ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="h-dvh w-full overflow-hidden flex flex-col">

    <div id="app" class="flex h-dvh w-full overflow-hidden">
        <!-- Sidebar -->
        <aside id="sidebar" class="fixed inset-y-0 left-0 z-50 w-72 glassmorphism-sidebar flex flex-col transform -translate-x-full transition-transform lg:relative lg:translate-x-0">
            <div class="p-6 border-b border-black/5 flex items-center justify-center">
                <img src="WhatsApp Image 2026-06-27 at 4.45.18 PM.jpeg" alt="Omi AI Logo" class="h-20 w-auto object-contain">
            </div>
            <div class="p-4">
                <button onclick="createNewChat()" class="w-full py-3 bg-black text-white rounded-xl font-medium">+ New Chat</button>
            </div>
            <div id="history-list" class="flex-1 overflow-y-auto px-4 space-y-1"></div>
        </aside>

        <!-- Main -->
        <main class="flex-1 flex flex-col bg-white relative">
            <header class="h-16 px-6 glassmorphism flex items-center justify-between border-b border-black/5">
                <div class="font-semibold text-sm truncate" id="current-chat-title">New Chat</div>
                <button onclick="openSettings()" class="text-xs font-medium px-4 py-2 bg-gray-100 rounded-lg">Settings</button>
            </header>
            
            <div id="chat-container" class="flex-1 overflow-y-auto px-6 py-8 space-y-6 max-w-4xl mx-auto w-full"></div>
            
            <div class="px-6 py-4 bg-white/80 border-t max-w-4xl mx-auto w-full">
                <div class="flex items-center gap-2 glassmorphism px-2 py-2 rounded-2xl border border-black/10">
                    <button onclick="document.getElementById('file-upload').click()" class="p-3 text-gray-500 hover:text-black">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                    </button>
                    <input type="file" id="file-upload" class="hidden" onchange="handleFileUpload(event)">
                    <textarea id="user-input" rows="1" class="flex-1 bg-transparent border-none outline-none resize-none text-sm px-2" placeholder="Message Omi AI..."></textarea>
                    <button onclick="sendMessage()" class="p-2.5 bg-black text-white rounded-xl">Send</button>
                </div>
            </div>
        </main>
    </div>

    <!-- Settings -->
    <div id="settings-modal" class="fixed inset-0 bg-black/40 backdrop-blur-sm hidden z-[100] flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl w-full max-w-md p-6">
            <h2 class="text-lg font-bold mb-4">Settings</h2>
            <input type="password" id="api-key" placeholder="API Key" class="w-full p-3 mb-4 bg-gray-50 border rounded-xl text-sm">
            <label class="block text-xs font-semibold mb-1">Model ID</label>
            <input type="text" id="model-name" placeholder="deepseek/deepseek-r1:free" class="w-full p-3 mb-4 bg-gray-50 border rounded-xl text-sm font-mono">
            <button onclick="saveSettings()" class="w-full py-2 bg-black text-white rounded-xl">Save</button>
        </div>
    </div>

    <script>
        let chats = JSON.parse(localStorage.getItem('omi_chats') || '[]');
        let config = JSON.parse(localStorage.getItem('omi_config') || '{"apiKey":"","model":"deepseek/deepseek-r1:free"}');
        let attachedFile = null;

        function handleFileUpload(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (ev) => { attachedFile = ev.target.result; alert("File attached: " + file.name); };
                reader.readAsDataURL(file);
            }
        }

        function saveSettings() {
            config.apiKey = document.getElementById('api-key').value;
            config.model = document.getElementById('model-name').value;
            localStorage.setItem('omi_config', JSON.stringify(config));
            document.getElementById('settings-modal').classList.add('hidden');
        }

        function openSettings() { 
            document.getElementById('api-key').value = config.apiKey;
            document.getElementById('model-name').value = config.model;
            document.getElementById('settings-modal').classList.remove('hidden'); 
        }

        async function sendMessage() {
            const input = document.getElementById('user-input');
            if(!input.value.trim() || !config.apiKey) return;
            console.log("Sending...");
            input.value = ''; 
            attachedFile = null;
        }

        function createNewChat() { location.reload(); }
    </script>
</body>
</html>
